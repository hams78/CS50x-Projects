<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link href="styles.css" rel="stylesheet">
    <script>
        function greetUser(event) {
            event.preventDefault();
            let name = document.querySelector('#userName').value;
            if (name.trim() === "") {
                alert("Please enter a valid name!");
            } else {
                alert("Hello, " + name + "! Thank you for visiting my homepage.");
            }
        }
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">My Space</a>
        <div class="navbar-nav">
            <a class="nav-item nav-link" href="index.html">Home</a>
            <a class="nav-item nav-link" href="hobbies.html">Hobbies</a>
            <a class="nav-item nav-link" href="projects.html">Projects</a>
            <a class="nav-item nav-link active" href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4">Get In Touch</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form onsubmit="greetUser(event)">
                    <div class="form-group">
                        <label for="userName">Your Name:</label>
                        <input type="text" id="userName" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Say Hello</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
